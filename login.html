<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de login do portal Copa 2026.">
  <title>Login - Copa do Mundo 2026</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

  <header>
    <h1>Copa do Mundo 2026</h1>
    <p>Entrar na sua conta</p>
    <nav class="top-nav" aria-label="Navegação principal">
      <a href="/index.html">Seleções</a>
      <a href="/tabela.html">Tabela da Copa</a>
      <a href="/acesso.html">Acesso</a>
    </nav>
  </header>

  <main id="main-content" class="container" tabindex="-1">
    <section class="auth-wrapper" aria-labelledby="login-title">
      <h2 id="login-title">Login</h2>

      <form class="auth-form" action="#" method="post">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="voce@email.com" required>

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" placeholder="••••••••" required>

        <button type="submit">Entrar</button>
      </form>

      <div class="auth-actions">
        <a href="/cadastro.html">Não tem conta? Criar cadastro</a>
        <a href="/acesso.html">← Voltar para acesso</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Copa do Mundo.</p>
  </footer>
</body>
</html>
